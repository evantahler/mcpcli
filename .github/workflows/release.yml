name: Release

on:
  release:
    types: [published]

permissions:
  contents: write
  id-token: write

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - run: bun lint
      - run: bun test

  publish-npm:
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  build-binaries:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - target: bun-darwin-arm64
            artifact: mcpcli-darwin-arm64
          - target: bun-darwin-x64
            artifact: mcpcli-darwin-x64
          - target: bun-linux-arm64
            artifact: mcpcli-linux-arm64
          - target: bun-linux-x64
            artifact: mcpcli-linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      - run: bun install --frozen-lockfile
      - name: Build binary
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          bun build --compile --minify --sourcemap \
            --target=${{ matrix.target }} \
            --define BUILD_VERSION="'\"$VERSION\"'" \
            ./src/cli.ts --outfile dist/${{ matrix.artifact }}
      - name: Upload to release
        run: gh release upload "$GITHUB_REF_NAME" dist/${{ matrix.artifact }} --clobber
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
